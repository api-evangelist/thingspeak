naftiko: 1.0.0-alpha2
info:
  label: ThingSpeak Update API — Update
  description: ThingSpeak Update API — single-entry write plus bulk batches. Lead
    operation — Update Channel Feed. Self-contained Naftiko capability covering
    ThingSpeak's primary device write surface.
  tags:
  - ThingSpeak
  - Update
  - IoT
  - Telemetry
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    THINGSPEAK_WRITE_API_KEY: THINGSPEAK_WRITE_API_KEY
capability:
  consumes:
  - type: http
    namespace: update-update
    baseUri: https://api.thingspeak.com
    description: ThingSpeak Update API — write entries to channels.
    resources:
    - name: update
      path: /update.json
      operations:
      - name: updatechannel
        method: POST
        description: Write a single entry to a channel.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: bulk-update
      path: /channels/{channel_id}/bulk_update.json
      operations:
      - name: bulkupdatechannel
        method: POST
        description: Bulk write up to 14,400 entries (paid) or 960 entries (free) in
          a single request.
        inputParameters:
        - name: channel_id
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: apikey
      key: THINGSPEAKAPIKEY
      value: '{{env.THINGSPEAK_WRITE_API_KEY}}'
      placement: header
  exposes:
  - type: mcp
    namespace: update-update-mcp
    port: 9090
    transport: http
    description: MCP adapter for ThingSpeak Update API.
    tools:
    - name: thingspeak-update-channel
      description: Write a single entry to a channel (set field1-field8, lat, long, status).
      hints:
        readOnly: false
        idempotent: false
      call: update-update.updatechannel
      with:
        body: tools.body
    - name: thingspeak-bulk-update-channel
      description: Bulk-write many entries to a channel in a single request.
      hints:
        readOnly: false
        idempotent: false
      call: update-update.bulkupdatechannel
      with:
        channel_id: tools.channel_id
        body: tools.body
